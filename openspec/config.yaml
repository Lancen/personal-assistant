schema: spec-driven

# Project context
context: |
  ## 领域知识
  项目: 个人私有 AI 智能助手，集成情绪管理、知识沉淀、任务管理三大核心能力
  目标用户: 追求自我成长的知识工作者、关注心理健康的个人成长实践者、需要系统化沉淀知识的学习者
  核心痛点:
    - 缺少私密、端到端加密的个人记录工具，集中管理情绪、想法、任务
    - 决策时容易被情绪绑架，缺少客观提醒机制
    - 读书笔记零散，无法追踪长时间跨度的认知变化
    - 零散想法无法有效聚合沉淀，容易丢失

  ## 技术栈
  架构: Monorepo 前后端分离，pnpm workspace 管理
  包管理: pnpm（禁止 npm/yarn）
  数据访问: 前端只允许通过 API 获取后端数据，禁止直接访问数据库
  前端: Next.js 16.2.4 + React 19 + TypeScript（严格模式）+ Tailwind CSS v4 + App Router
  后端: Express.js 4.x + TypeScript（严格模式）+ PostgreSQL + Drizzle ORM + pg + Redis + RESTful API
  共享包: @personal-assistant/types（前后端共享类型定义）
  运行地址: 前端 localhost:3000，后端 localhost:3001
  常用命令:
    - pnpm install / pnpm dev / pnpm dev:backend / pnpm dev:frontend
    - pnpm build（types → drizzle → backend → frontend）
    - pnpm lint / pnpm typecheck

  ## 代码规范
  TypeScript: 禁止 any 类型，启用严格模式，所有变量和函数需正确类型标注
  命名: 组件 PascalCase，函数和变量 camelCase
  Git: conventional commits（feat/fix/docs/refactor/style/test），主分支 main，PR 合并
  安全: 禁止修改 .env、禁止硬编码敏感信息、密码 bcrypt 哈希、token 正确验证、输入验证防注入
  测试: 保留测试文件，提交前必须通过 pnpm lint 和 pnpm typecheck
  API 响应: 统一结构（success/error/paginated），分页默认 20 条/页，类型定义在 @personal-assistant/types

  ## 测试策略
  E2E: Playwright（配置在根目录 playwright.config.ts，测试目录 ./e2e），覆盖前端 UI 交互流程
  后端 API: Vitest + supertest，对每个 API 端点编写集成测试，验证请求/响应结构和错误处理
  原则: 后端新 API 必须有对应的 API 集成测试，前端关键用户流程必须有 E2E 测试

  ## 行为准则
  - 编码前先思考：不假设，不隐藏困惑，揭示权衡
  - 简洁优先：用最少代码解决问题，不做猜测性设计
  - 精准修改：只改必须改的，不重构没坏的东西
  - 目标驱动：定义成功标准，循环直到验证通过

# 全局规则
rules:
  # 所有生成的内容都必须使用中文
  global:
    - 所有生成的文档、注释、任务描述、提案内容都必须使用中文输出
    - 保持代码标识符和技术术语为英文，但注释和文档必须是中文

  proposal:
    - 所有提案文档必须使用中文撰写
    - 提案需要包含清晰的目标、非目标、设计方案和任务分解
    - 保持内容简洁明了，便于理解
    - 必须包含“验收标准 (Acceptance Criteria)”章节
    - 验收标准使用 Given-When-Then 格式编写
    - 每个验收标准必须有唯一编号（如 AC-1、AC-2）
    - 验收标准应覆盖成功场景和关键错误场景
    - 包含性能指标（如响应时间、并发数）的验收要求
    - 明确标注自动化测试的覆盖范围
    - 涉及数据库变更时，必须在验收标准中验证数据完整性

  tasks:
    - 所有任务描述必须使用中文
    - 将大型任务拆分为不超过 2 小时的小任务
    - 任务描述要具体，便于执行
    - 为每个验收标准创建对应的测试任务
    - 规划任务时必须同步生成验收任务，与 AC 一一对应，确保可自动化验证
    - 后端 API 验收测试使用真实数据库 + 事务回滚隔离（非 mock DAO）
    - AI 相关测试统一使用 mock，不依赖外部 LLM 服务
    - 性能指标验收使用自动化断言（后端 Vitest 计时，前端 Playwright 计时）
    - 编写和验证必须拆为独立任务：先「编写 X 测试」，再「验证 X 测试通过」，禁止在同一个任务中既写代码又标完成
    
  specs:
    - 所有技术规格文档必须使用中文
    - 需要包含清晰的数据结构、API 设计和实现细节
    - 使用 Given/When/Then 格式编写场景
    - 引用现有模式前不发明新模式
    - 数据库表定义必须包含完整的 COMMENT 注释
    - 表注释格式：COMMENT ON TABLE table_name IS '表名_业务含义说明';
    - 字段注释格式：COMMENT ON COLUMN table_name.column_name IS '字段名_业务含义说明';
    - 主键、外键、索引需要单独注释说明其作用
    - 枚举字段必须注释所有可能值，例如：'0-未激活, 1-已激活, 2-已禁用'
    - 金额、数量等关键业务字段需注明单位和精度

  design:
    - 复杂流程需要包含时序图或架构图
    - 数据库设计部分必须包含实体关系图（ERD）
    - 每个表需要说明其业务场景和生命周期
