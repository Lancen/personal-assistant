schema: spec-driven

# 输出语言设置
language: zh-CN

# Project context
context: |
  技术栈: TypeScript, React 19, Next.js 16, Express.js, Node.js
  项目类型: 个人助手 Monorepo 项目
  代码规范: 使用 ESLint，遵循 conventional commits
  架构: 前后端分离，types 包共享类型定义

# 全局规则
rules:
  # 所有生成的内容都必须使用中文
  global:
    - 所有生成的文档、注释、任务描述、提案内容都必须使用中文输出
    - 保持代码标识符和技术术语为英文，但注释和文档必须是中文

  proposal:
    - 所有提案文档必须使用中文撰写
    - 提案需要包含清晰的目标、非目标、设计方案和任务分解
    - 保持内容简洁明了，便于理解
    - 必须包含“验收标准 (Acceptance Criteria)”章节
    - 验收标准使用 Given-When-Then 格式编写
    - 每个验收标准必须有唯一编号（如 AC-1、AC-2）
    - 验收标准应覆盖成功场景和关键错误场景
    - 包含性能指标（如响应时间、并发数）的验收要求
    - 明确标注自动化测试的覆盖范围

  tasks:
    - 所有任务描述必须使用中文
    - 将大型任务拆分为不超过 2 小时的小任务
    - 任务描述要具体，便于执行
    - 为每个验收标准创建对应的测试任务

  spec:
    - 所有技术规格文档必须使用中文
    - 需要包含清晰的数据结构、API 设计和实现细节
    - 使用 Given/When/Then 格式编写场景
    - 引用现有模式前不发明新模式

  design:
    - 复杂流程需要包含时序图或架构图
